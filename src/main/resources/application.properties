spring.application.name=${APP_NAME:ezInventory}
server.port=${PORT:8085}

# PostgreSQL datasource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:inventory}

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=${FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.schemas=${DB_SCHEMA:inventory}
spring.flyway.default-schema=${DB_SCHEMA:inventory}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE:false}
spring.flyway.validate-on-migrate=${FLYWAY_VALIDATE:true}
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:false}
spring.flyway.create-schemas=${FLYWAY_CREATE_SCHEMAS:true}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXP:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXP:604800000}

# HikariCP
spring.datasource.hikari.connection-init-sql=SET search_path TO ${DB_SCHEMA:inventory}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.connection-test-query=${HIKARI_TEST_QUERY:SELECT 1}

# Logging
logging.level.org.flywaydb=${LOG_FLYWAY:DEBUG}
logging.level.org.springframework.jdbc=${LOG_JDBC:DEBUG}

#MCP
mcp.ai.url=${MCP_URL}
auth.service.url=${AUTH_URL}

#actuator
management.endpoints.web.exposure.include=${ACTUATOR_TYPES}

# Razorpay
#razorpay.key-id=${RAZORPAY_KEY_ID}
#razorpay.key-secret=${RAZORPAY_KEY_SECRET}
#razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET}
#razorpay.currency=${RAZORPAY_CURRENCY:INR}

service.internal.secret=${SERVICE_INTERNAL_SECRET:}

# Meta WhatsApp Cloud API
meta.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
meta.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
meta.whatsapp.otp-template-name=${WHATSAPP_OTP_TEMPLATE:login_otp}
meta.whatsapp.template-language=${WHATSAPP_TEMPLATE_LANG:en}
meta.whatsapp.webhook-verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
meta.whatsapp.api-version=${WHATSAPP_API_VERSION:v19.0}

# Mail SMTP transport (Spring auto-configuration)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.test-connection=${MAIL_TEST_CONNECTION:false}

# AWS S3 File Storage
aws.s3.access-key-id=${AWS_ACCESS_KEY_ID}
aws.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY}
aws.s3.region=${AWS_REGION:ap-south-1}
aws.s3.bucket=${AWS_S3_BUCKET}

# Gmail application-level sender settings
gmail.sender-name=${GMAIL_SENDER_NAME:EZH Notifications}
gmail.sender-email=${GMAIL_SENDER_EMAIL:${MAIL_USERNAME:}}
gmail.reply-to=${GMAIL_REPLY_TO:}
gmail.otp-validity-minutes=${GMAIL_OTP_VALIDITY:10}
gmail.support-url=${GMAIL_SUPPORT_URL:https://ezh.com/support}
gmail.logo-url=${GMAIL_LOGO_URL:https://ezh.com/assets/logo.png}
gmail.enabled=${GMAIL_ENABLED:true}